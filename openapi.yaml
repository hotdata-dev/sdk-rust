tags:
  - name: Workspaces
    description: Workspace management
  - name: Query
    description: >-
      Execute SQL queries against connected data sources. Use standard Postgres-compatible SQL syntax to query and join
      across multiple connections and datasets. Results are returned inline and also persisted asynchronously for later
      retrieval.
  - name: Connections
    description: >-
      Manage connections to remote databases (Postgres, MySQL, Snowflake, BigQuery, DuckDB, Iceberg, etc.). Creating a
      connection registers the source and triggers automatic schema discovery. Each connection's tables are cached
      locally for fast query performance.
  - name: Refresh
    description: >-
      Refresh schema metadata and table data for connections. Schema refresh re-discovers tables and column definitions
      from the remote source. Data refresh re-syncs cached data with the latest from the remote tables.
  - name: Information Schema
    description: >-
      Inspect table and column metadata across all connections. Returns schema information including column names, data
      types, and sync status for every discovered table.
  - name: Secrets
    description: >-
      Store and manage credentials used by connections. Secrets are encrypted at rest and referenced by connections for
      authentication. Secret values are never returned by the API — only metadata (name, timestamps) is exposed.
  - name: Results
    description: >-
      Retrieve persisted query results. Every query execution persists its results asynchronously. Results transition
      through statuses: processing → ready (or failed). Once ready, the full result data can be retrieved by ID.
  - name: Query Runs
    description: >-
      View the history of executed queries. Each query run records the SQL text, execution time, result reference, and
      status. Useful for auditing and debugging query performance.
  - name: Uploads
    description: >-
      Upload files (CSV, JSON, Parquet) that can be used as sources for datasets. Files are stored temporarily and
      referenced by ID when creating a dataset. Maximum upload size is 2 GB.
  - name: Datasets
    description: >-
      User-managed tables created from uploaded files or inline data. Unlike connection tables (which mirror remote
      sources), datasets are fully managed and owned by you. Create a dataset from a CSV/JSON/Parquet upload or from
      inline data, then query it with SQL like any other table.
  - name: Saved Queries
    description: >-
      Save, version, and execute named SQL queries. Each update creates a new version, preserving the full history.
      Saved queries are automatically classified by category (e.g., aggregation, join, filtered scan) and can be
      executed by ID.
