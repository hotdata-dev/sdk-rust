      description: Response body for GET /query-runs
      required:
        - query_runs
        - count
        - limit
        - has_more
      properties:
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        limit:
          type: integer
          minimum: 0
        next_cursor:
