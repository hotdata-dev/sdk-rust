        - name: limit
          in: query
          description: 'Maximum number of results (default: 100, max: 1000)'
          required: false
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          description: 'Pagination offset (default: 0)'
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: List of results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResultsResponse'
  /v1/results/{id}:
    get:
      tags:
        - Results
      summary: Get result
      description: >-
        Retrieve a persisted query result by ID. If the result is still being processed, only the status is returned.
        Once ready, the full column and row data is included in the response.
      operationId: get_result_handler
      parameters:
        - name: id
          in: path
          description: Result ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Result data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetResultResponse'
        '404':
          description: Result not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /v1/secrets:
    get:
      tags:
        - Secrets
      summary: List secrets
      description: List all stored secrets. Only metadata (name, timestamps) is returned — secret values are never exposed.
      operationId: list_secrets_handler
      responses:
        '200':
          description: List of secrets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSecretsResponse'
    post:
      tags:
        - Secrets
      summary: Create secret
      description: >-
        Store a new named secret. The value is encrypted at rest and can be referenced by connections for
        authentication. Secret names must be unique.
      operationId: create_secret_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecretRequest'
        required: true
      responses:
        '201':
          description: Secret created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSecretResponse'
        '409':
          description: Secret already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /v1/secrets/{name}:
    get:
      tags:
        - Secrets
      summary: Get secret
      description: Get metadata for a secret. The secret value is never returned.
      operationId: get_secret_handler
      parameters:
        - name: name
          in: path
          description: Secret name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Secret metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSecretResponse'
        '404':
          description: Secret not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      tags:
        - Secrets
      summary: Update secret
      operationId: update_secret_handler
      parameters:
        - name: name
          in: path
          description: Secret name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSecretRequest'
        required: true
      responses:
        '200':
          description: Secret updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSecretResponse'
        '404':
          description: Secret not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      tags:
        - Secrets
      summary: Delete secret
      operationId: delete_secret_handler
      parameters:
        - name: name
          in: path
          description: Secret name
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Secret deleted
        '404':
          description: Secret not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  schemas:
    WorkspaceListItem:
      type: object
      required:
        - public_id
        - name
        - active
        - favorite
        - provision_status
        - namespace
      properties:
        public_id:
          type: string
          example: ws_abc123
        name:
          type: string
          example: production-analytics
        active:
          type: boolean
        favorite:
          type: boolean
        provision_status:
          type: string
          example: provisioned
        namespace:
          type: string
          example: workspace-ws_abc123
    WorkspaceDetail:
      type: object
      required:
        - public_id
        - name
        - provision_status
        - namespace
      properties:
        public_id:
          type: string
          example: ws_abc123
        name:
          type: string
          example: production-analytics
        provision_status:
          type: string
          example: pending
        namespace:
          type: string
          example: workspace-ws_abc123
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Machine-readable error code.
          example: missing_authorization
    ApiErrorDetail:
      type: object
      description: Error detail within an API error response
      required:
        - message
        - code
      properties:
        code:
          type: string
        message:
          type: string
    ApiErrorResponse:
      type: object
      description: Standard error response body
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ApiErrorDetail'
    CategoryValueInfo:
      type: object
      description: A distinct value with its frequency count, used in categorical profiles.
      required:
        - value
        - count
      properties:
        count:
          type: integer
          format: int64
          description: Number of occurrences
          minimum: 0
        value:
          description: The distinct value (as a string, or null)
    ColumnDefinition:
      oneOf:
        - type: string
          description: Simple type name (e.g., "VARCHAR", "INT", "DATE")
        - $ref: '#/components/schemas/ColumnTypeSpec'
          description: Detailed specification with type and optional properties
      description: |-
        Column type specification - either a simple type string or detailed spec with properties.

        Simple form: `"VARCHAR"`, `"INT"`, `"DATE"`
        Detailed form: `{ "type": "DECIMAL", "precision": 10, "scale": 2 }`
    ColumnInfo:
      type: object
      description: Column metadata for API responses
      required:
        - name
        - data_type
        - nullable
      properties:
        data_type:
          type: string
        name:
          type: string
        nullable:
          type: boolean
    ColumnProfileDetail:
      oneOf:
        - type: object
          description: |-
            Low-cardinality column (≤200 distinct values). Applies to text and numeric columns.
            Values are sorted by frequency descending.
          required:
            - values
            - type
          properties:
            type:
              type: string
              enum:
                - categorical
            values:
              type: array
              items:
                $ref: '#/components/schemas/CategoryValueInfo'
              description: Distinct values with their counts, ordered by count descending
        - type: object
          description: High-cardinality text column (>200 distinct values).
          required:
            - min_length
            - max_length
            - avg_length
            - type
          properties:
            avg_length:
              type: number
              format: double
              description: Average string length
            max_length:
              type: integer
              format: int64
              description: Longest string length in the column
              minimum: 0
            min_length:
              type: integer
              format: int64
              description: Shortest string length in the column
              minimum: 0
            type:
              type: string
              enum:
                - text
        - type: object
          description: High-cardinality numeric column (>200 distinct values).
          required:
            - min
            - max
            - mean
            - type
          properties:
            max:
              type: string
              description: Maximum value (string to preserve precision for large integers and decimals)
            mean:
              type: number
              format: double
              description: Arithmetic mean
            min:
              type: string
              description: Minimum value (string to preserve precision for large integers and decimals)
            type:
              type: string
              enum:
                - numeric
        - type: object
          description: Date or timestamp column.
          required:
            - min
            - max
            - type
          properties:
            max:
              type: string
              description: Latest value as ISO-8601 string
            min:
              type: string
              description: Earliest value as ISO-8601 string
            type:
              type: string
              enum:
                - temporal
        - type: object
          description: Boolean column.
          required:
            - true_count
            - false_count
            - type
          properties:
            false_count:
              type: integer
              format: int64
              description: Number of false values
              minimum: 0
            true_count:
              type: integer
              format: int64
              description: Number of true values
              minimum: 0
            type:
              type: string
              enum:
                - boolean
      description: |-
        Type-specific column profile detail. The `type` discriminator field determines which
        variant is present. Profile type is chosen based on the column's Arrow data type and
        cardinality:

        - **categorical**: Text or numeric columns with ≤200 distinct values. Lists each value with its frequency.
        - **text**: Text columns with >200 distinct values. Reports string length statistics.
        - **numeric**: Numeric columns with >200 distinct values. Reports min, max, and mean.
        - **temporal**: Date and timestamp columns. Reports min and max as ISO-8601 strings.
        - **boolean**: Boolean columns. Reports true and false counts.
    ColumnProfileInfo:
      type: object
      description: Statistics for a single column.
      required:
        - name
        - data_type
        - null_count
        - null_percentage
        - cardinality
      properties:
        cardinality:
          type: integer
          format: int64
          description: Approximate number of distinct non-null values
          minimum: 0
        data_type:
          type: string
          description: Arrow data type (e.g. "Utf8", "Int32", "Timestamp(Microsecond, Some(\"UTC\"))")
        name:
          type: string
          description: Column name
        null_count:
          type: integer
          format: int64
          description: Number of null values
          minimum: 0
        null_percentage:
          type: number
          format: double
          description: Percentage of null values (0.0 to 100.0)
        profile:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/ColumnProfileDetail'
              description: Type-specific profile detail. Null when the column is all-null or has an unsupported type.
    ColumnTypeSpec:
      type: object
      description: Detailed column type specification with optional properties.
      required:
        - type
      properties:
        geometry_type:
          type:
            - string
            - 'null'
          description: |-
            Geometry type for GEOMETRY/GEOGRAPHY columns.
            E.g., "Point", "LineString", "Polygon", "MultiPoint", "MultiLineString",
            "MultiPolygon", "GeometryCollection", or "Geometry" (any).
        precision:
          type:
            - integer
            - 'null'
          format: int32
          description: Precision for DECIMAL type (1-38)
          minimum: 0
        scale:
          type:
            - integer
            - 'null'
          format: int32
          description: Scale for DECIMAL type
        srid:
          type:
            - integer
            - 'null'
          format: int32
          description: |-
            Spatial Reference System Identifier for GEOMETRY/GEOGRAPHY types.
            Common values: 4326 (WGS84), 3857 (Web Mercator).
        type:
          type: string
          description: The data type name (e.g., "DECIMAL", "TIMESTAMP", "GEOMETRY")
    ConnectionHealthResponse:
      type: object
      description: Response body for GET /connections/{connection_id}/health
      required:
        - connection_id
        - healthy
        - latency_ms
      properties:
        connection_id:
          type: string
        error:
          type:
            - string
            - 'null'
        healthy:
          type: boolean
        latency_ms:
          type: integer
          format: int64
          minimum: 0
    ConnectionInfo:
      type: object
      description: Single connection metadata for API responses
      required:
        - id
        - name
        - source_type
      properties:
        id:
          type: string
        name:
          type: string
        source_type:
          type: string
    ConnectionRefreshResult:
