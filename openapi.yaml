          type: integer
          description: Number of results returned in this response
          minimum: 0
        has_more:
          type: boolean
          description: Whether there are more results available after this page
        limit:
          type: integer
          description: Limit used for this request
          minimum: 0
        offset:
          type: integer
          description: Pagination offset used for this request
          minimum: 0
        results:
          type: array
          items:
            $ref: '#/components/schemas/ResultInfo'
    ListSavedQueriesResponse:
      type: object
      description: Response body for GET /v1/queries
      required:
        - queries
        - count
        - offset
        - limit
        - has_more
      properties:
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        limit:
          type: integer
          minimum: 0
        offset:
          type: integer
          minimum: 0
        queries:
          type: array
          items:
            $ref: '#/components/schemas/SavedQuerySummary'
    ListSavedQueryVersionsResponse:
      type: object
      description: Response body for GET /v1/queries/{id}/versions
      required:
        - saved_query_id
        - versions
        - count
        - offset
        - limit
        - has_more
      properties:
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        limit:
          type: integer
          minimum: 0
        offset:
          type: integer
          minimum: 0
        saved_query_id:
          type: string
        versions:
          type: array
          items:
            $ref: '#/components/schemas/SavedQueryVersionInfo'
    ListSecretsResponse:
      type: object
      description: Response body for GET /secrets
      required:
        - secrets
      properties:
        secrets:
          type: array
          items:
            $ref: '#/components/schemas/SecretMetadataResponse'
    ListUploadsResponse:
      type: object
      description: Response body for GET /v1/files
      required:
        - uploads
      properties:
        uploads:
          type: array
          items:
            $ref: '#/components/schemas/UploadInfo'
    QueryRequest:
      type: object
      description: Request body for POST /query
      required:
        - sql
      properties:
        sql:
          type: string
    QueryResponse:
      type: object
      description: |-
        Response body for POST /query

        Query results are returned immediately along with a `result_id` for later retrieval.
        The actual persistence to storage happens asynchronously in the background.

        To check if a result is ready for SQL queries, poll GET /results/{id} and check `status`:
        - `"processing"`: Persistence is still in progress
        - `"ready"`: Result is available for retrieval and SQL queries
        - `"failed"`: Persistence failed (check `error_message` for details)
      required:
        - query_run_id
        - columns
        - nullable
        - rows
        - row_count
        - execution_time_ms
      properties:
        columns:
          type: array
          items:
            type: string
        execution_time_ms:
          type: integer
          format: int64
          minimum: 0
        nullable:
          type: array
          items:
            type: boolean
          description: |-
            Nullable flags for each column (parallel to columns vec).
            True if the column allows NULL values, false if NOT NULL.
        query_run_id:
          type: string
          description: Unique identifier for the query run record (qrun...).
        result_id:
          type:
            - string
            - 'null'
          description: |-
            Unique identifier for retrieving this result via GET /results/{id}.
            Null if catalog registration failed (see `warning` field for details).
            When non-null, the result is being persisted asynchronously.
        row_count:
          type: integer
          minimum: 0
        rows:
          type: array
          items:
            type: array
            items: {}
        warning:
          type:
            - string
            - 'null'
          description: |-
            Warning message if result persistence could not be initiated.
            When present, `result_id` will be null and the result cannot be retrieved later.
            The query results are still returned in this response.
    QueryRunInfo:
      type: object
      description: Single query run for listing
      required:
        - id
        - status
        - sql_text
        - sql_hash
        - snapshot_id
        - created_at
      properties:
        completed_at:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
        error_message:
          type:
            - string
            - 'null'
        execution_time_ms:
          type:
            - integer
            - 'null'
          format: int64
        id:
          type: string
        result_id:
          type:
            - string
            - 'null'
        row_count:
          type:
            - integer
            - 'null'
          format: int64
        saved_query_id:
          type:
            - string
            - 'null'
        saved_query_version:
          type:
            - integer
            - 'null'
          format: int32
        snapshot_id:
          type: string
        sql_hash:
          type: string
        sql_text:
          type: string
        status:
          type: string
        trace_id:
          type:
            - string
            - 'null'
        warning_message:
          type:
            - string
            - 'null'
    RefreshRequest:
      type: object
      description: Request body for POST /refresh
      properties:
        connection_id:
          type:
            - string
            - 'null'
        data:
          type: boolean
        include_uncached:
          type: boolean
          description: |-
            Controls whether uncached tables are included in connection-wide data refresh.

            - `false` (default): Only refresh tables that already have cached data.
              This is the common case for keeping existing data up-to-date.
            - `true`: Also sync tables that haven't been cached yet, essentially performing
              an initial sync for any new tables discovered since the connection was created.

            This field only applies to connection-wide data refresh (when `data=true` and
            `table_name` is not specified). It has no effect on single-table refresh or
            schema refresh operations.
        schema_name:
          type:
            - string
            - 'null'
        table_name:
          type:
            - string
            - 'null'
    RefreshResponse:
      oneOf:
        - $ref: '#/components/schemas/SchemaRefreshResult'
        - $ref: '#/components/schemas/TableRefreshResult'
        - $ref: '#/components/schemas/ConnectionRefreshResult'
      description: Unified response type for refresh operations
    RefreshWarning:
      type: object
      description: |-
        Non-fatal warning that occurred during a refresh operation.
        Used to report issues like failed deletion scheduling that don't
        prevent the refresh from succeeding.
      required:
        - message
      properties:
        message:
          type: string
        schema_name:
          type:
            - string
            - 'null'
        table_name:
          type:
            - string
            - 'null'
    ResultInfo:
      type: object
      description: Summary of a persisted query result for listing
      required:
        - id
        - status
        - created_at
      properties:
        created_at:
          type: string
          format: date-time
        error_message:
          type:
            - string
            - 'null'
        id:
          type: string
        status:
          type: string
    SavedQueryDetail:
      type: object
      description: Saved query detail (includes latest version's SQL)
      required:
        - id
        - name
        - latest_version
        - sql
        - sql_hash
        - tags
        - description
        - created_at
        - updated_at
      properties:
        category:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        description:
          type: string
        has_aggregation:
          type:
            - boolean
            - 'null'
        has_group_by:
          type:
            - boolean
            - 'null'
        has_join:
          type:
            - boolean
            - 'null'
        has_limit:
          type:
            - boolean
            - 'null'
        has_order_by:
          type:
            - boolean
            - 'null'
        has_predicate:
          type:
            - boolean
            - 'null'
        id:
          type: string
        latest_version:
          type: integer
          format: int32
        name:
          type: string
        num_tables:
          type:
            - integer
            - 'null'
          format: int32
        sql:
          type: string
        sql_hash:
          type: string
        table_size:
          type:
            - string
            - 'null'
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
    SavedQuerySummary:
      type: object
      description: Saved query summary for listing
      required:
        - id
        - name
        - latest_version
        - tags
        - description
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
        description:
          type: string
        id:
          type: string
        latest_version:
          type: integer
          format: int32
        name:
          type: string
        tags:
          type: array
          items:
            type: string
        updated_at:
          type: string
          format: date-time
    SavedQueryVersionInfo:
      type: object
      description: Single saved query version
      required:
        - version
        - sql
        - sql_hash
        - created_at
      properties:
        category:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        has_aggregation:
          type:
            - boolean
            - 'null'
        has_group_by:
          type:
            - boolean
            - 'null'
        has_join:
          type:
            - boolean
            - 'null'
        has_limit:
          type:
            - boolean
            - 'null'
        has_order_by:
          type:
            - boolean
            - 'null'
        has_predicate:
          type:
            - boolean
            - 'null'
        num_tables:
          type:
            - integer
            - 'null'
          format: int32
        sql:
          type: string
        sql_hash:
          type: string
        table_size:
          type:
            - string
            - 'null'
        version:
          type: integer
          format: int32
    SchemaRefreshResult:
      type: object
      description: Response for schema refresh operations
      required:
        - connections_refreshed
        - connections_failed
        - tables_discovered
        - tables_added
        - tables_modified
      properties:
        connections_failed:
          type: integer
          minimum: 0
        connections_refreshed:
          type: integer
          minimum: 0
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionSchemaError'
        tables_added:
          type: integer
          minimum: 0
        tables_discovered:
          type: integer
          minimum: 0
        tables_modified:
          type: integer
          minimum: 0
    SecretMetadataResponse:
      type: object
      description: Single secret metadata for API responses
      required:
        - name
        - created_at
        - updated_at
      properties:
        created_at:
          type: string
          format: date-time
        name:
          type: string
        updated_at:
          type: string
          format: date-time
    TableInfo:
      type: object
      description: Single table metadata
      required:
        - connection
        - schema
        - table
        - synced
      properties:
        columns:
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/ColumnInfo'
        connection:
          type: string
        last_sync:
          type:
            - string
            - 'null'
        schema:
          type: string
        synced:
          type: boolean
        table:
          type: string
    TableProfileResponse:
      type: object
      description: |-
        Column-level statistics for a synced table. Profiles are computed at sync time
        and include per-column cardinality, null counts, and type-specific details.
      required:
        - connection
        - schema
        - table
        - row_count
        - columns
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnProfileInfo'
          description: Per-column profile statistics
        connection:
          type: string
          description: Connection name
        row_count:
          type: integer
          description: Total number of rows in the table
          minimum: 0
        schema:
          type: string
          description: Schema name
        synced_at:
          type:
            - string
            - 'null'
          description: When the table was last synced
        table:
          type: string
          description: Table name
    TableRefreshError:
      type: object
      description: Error details for a failed table refresh
      required:
        - schema_name
        - table_name
        - error
      properties:
        error:
          type: string
        schema_name:
          type: string
        table_name:
          type: string
    TableRefreshResult:
      type: object
      description: Response for single table data refresh
      required:
        - connection_id
        - schema_name
        - table_name
        - rows_synced
        - duration_ms
      properties:
        connection_id:
          type: string
        duration_ms:
          type: integer
          format: int64
          minimum: 0
        rows_synced:
          type: integer
          minimum: 0
        schema_name:
          type: string
        table_name:
          type: string
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/RefreshWarning'
    UpdateDatasetRequest:
      type: object
      description: Request body for PUT /v1/datasets/{id}
      properties:
        label:
          type:
            - string
            - 'null'
        table_name:
          type:
            - string
            - 'null'
    UpdateDatasetResponse:
      type: object
      description: Response body for PUT /v1/datasets/{id}
      required:
        - id
        - label
        - table_name
        - updated_at
      properties:
        id:
          type: string
        label:
          type: string
        table_name:
          type: string
        updated_at:
          type: string
          format: date-time
    UpdateSavedQueryRequest:
      type: object
      description: Request body for PUT /v1/queries/{id}
      properties:
        category_override:
          type:
            - string
            - 'null'
          description: Override the auto-detected category. Send `null` to clear (revert to auto).
        description:
          type:
            - string
            - 'null'
        name:
          type:
            - string
            - 'null'
          description: Optional new name. When omitted the existing name is preserved.
        sql:
          type:
            - string
            - 'null'
          description: Optional new SQL. When omitted the existing SQL is preserved.
        table_size_override:
          type:
            - string
            - 'null'
          description: User annotation for table size. Send `null` to clear.
        tags:
          type:
            - array
            - 'null'
          items:
            type: string
    UpdateSecretRequest:
      type: object
      description: Request body for PUT /secrets/{name}
      required:
        - value
      properties:
        value:
          type: string
    UpdateSecretResponse:
      type: object
      description: Response body for PUT /secrets/{name}
      required:
        - name
        - updated_at
      properties:
        name:
          type: string
        updated_at:
          type: string
          format: date-time
    UploadInfo:
      type: object
      description: Single upload info for listing
      required:
        - id
        - status
        - size_bytes
        - created_at
      properties:
        content_type:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        id:
          type: string
        size_bytes:
          type: integer
          format: int64
        status:
          type: string
    UploadResponse:
      type: object
      description: Response body for POST /v1/files
      required:
        - id
        - status
        - size_bytes
        - created_at
      properties:
        content_type:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        id:
          type: string
        size_bytes:
          type: integer
          format: int64
        status:
          type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Org-scoped API token obtained via CLI login or the dashboard.
    WorkspaceId:
      type: apiKey
      in: header
      name: X-Workspace-Id
      description: Public ID of the target workspace.
